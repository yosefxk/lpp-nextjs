version: '3.9'

services:
  backend:
    image: ghcr.io/yosefxk/lpp-nextjs-backend:latest
    container_name: israeli_license_plate_finder_backend
    ports:
      - "8081:8000"
    restart: unless-stopped
    networks:
      - media_network

  frontend:
    image: ghcr.io/yosefxk/lpp-nextjs-frontend:latest
    container_name: israeli_license_plate_finder_frontend
    ports:
      - "6942:3000"
    environment:
      - INTERNAL_BACKEND_URL=${INTERNAL_BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - media_network

networks:
  media_network:
    external: true
